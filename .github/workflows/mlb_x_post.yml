name: MLB X Auto Post

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  post-mlb-result:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run MLB bot
        env:
          SOURCE_URL: https://hochi.news/mlb/?kd_page=top
          x4f82aqG8aKuD1S7AKZWp6Tmz: ${{ secrets.X_API_KEY }}
          yoN37GSdid9pdH1OcAf7tOycDBIPiImhhK9HlMaIZhgW1hi1OH: ${{ secrets.X_API_SECRET }}
          2038505634308538368-sx79mVykvcxEh2c2ur1qNIsL0yerq2: ${{ secrets.X_ACCESS_TOKEN }}
          RXUpKwDAGfm0BiDInEadF1jL1jKgoTZ8xzc1Tt7Fb8Afi: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          LOG_LEVEL: INFO
        run: python bot.py

      - name: Commit updated state
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update posted MLB state"
          file_pattern: state.json
